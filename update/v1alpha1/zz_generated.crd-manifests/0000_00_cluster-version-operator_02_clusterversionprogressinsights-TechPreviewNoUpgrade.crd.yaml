apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.openshift.io: https://github.com/openshift/api/pull/2012
    api.openshift.io/merged-by-featuregates: "true"
    description: Provides summary information about an ongoing cluster control plane
      update in Standalone clusters.
    displayName: ClusterVersionProgressInsights
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: TechPreviewNoUpgrade
  name: clusterversionprogressinsights.update.openshift.io
spec:
  group: update.openshift.io
  names:
    kind: ClusterVersionProgressInsight
    listKind: ClusterVersionProgressInsightList
    plural: clusterversionprogressinsights
    singular: clusterversionprogressinsight
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterVersionStatusInsight reports the state of a ClusterVersion resource (which represents a control plane
          update in standalone clusters), during the update.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              spec is empty for now, ClusterVersionStatusInsight is purely status-reporting API. In the future spec may be used to hold
              configuration to drive what information is surfaced and how
            type: object
          status:
            description: status exposes the health and status of the ongoing cluster
              update
            properties:
              assessment:
                description: assessment is the assessment of the control plane update
                  process
                enum:
                - Unknown
                - Progressing
                - Completed
                - Degraded
                type: string
              completedAt:
                description: completedAt is the time when the update completed
                format: date-time
                type: string
              completion:
                description: completion is a percentage of the update completion (0-100)
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              conditions:
                description: conditions provides detailed observed conditions about
                  ClusterVersion
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 10
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              estimatedCompletedAt:
                description: estimatedCompletedAt is the estimated time when the update
                  will complete
                format: date-time
                type: string
              resource:
                description: |-
                  resource is the ClusterVersion resource that represents the control plane

                  Note: By OpenShift API conventions, in isolation this should be a specialized reference that refers just to
                  resource name (because the rest is implied by status insight type). However, because we use resource references in
                  many places and this API is intended to be consumed by clients, not produced, consistency seems to be more valuable
                  than type safety for producers.
                properties:
                  group:
                    description: group of the object being referenced, if any
                    maxLength: 253
                    type: string
                  name:
                    description: name of the object being referenced
                    maxLength: 253
                    minLength: 1
                    type: string
                  namespace:
                    description: namespace of the object being referenced, if any
                    maxLength: 253
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  resource:
                    description: resource of object being referenced
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                - resource
                type: object
              startedAt:
                description: startedAt is the time when the update started
                format: date-time
                type: string
              versions:
                description: versions contains the original and target versions of
                  the upgrade
                properties:
                  previous:
                    description: |-
                      previous is the version of the control plane before the update. When the cluster is being installed
                      for the first time, the version will have a placeholder value '<none>' and carry 'Installation' metadata
                    properties:
                      metadata:
                        description: |-
                          metadata is a list of metadata associated with the version. It is a list of key-value pairs. The value is optional
                          and when not provided, the metadata item has boolean semantics (presence indicates true)
                        items:
                          description: |-
                            VersionMetadata is a key:value item assigned to version involved in the update. Value can be empty, then the metadata
                            have boolean semantics (true when present, false when absent)
                          properties:
                            key:
                              description: key is the name of this metadata value
                              enum:
                              - Installation
                              - Partial
                              - Architecture
                              type: string
                            value:
                              description: value is the value for the metadata
                              maxLength: 32
                              type: string
                          required:
                          - key
                          type: object
                        maxItems: 5
                        type: array
                        x-kubernetes-list-map-keys:
                        - key
                        x-kubernetes-list-type: map
                      version:
                        description: |-
                          version is a semantic version string, or a placeholder '<none>' for the special case where this
                          is a "previous" version in a new installation, in which case the metadata must contain an item
                          with key 'Installation'
                        maxLength: 64
                        minLength: 5
                        type: string
                    required:
                    - version
                    type: object
                    x-kubernetes-validations:
                    - message: previous version must be '<none>' iff marked with Installation
                        metadata
                      rule: 'self.version == ''<none>'' ? (has(self.metadata) && self.metadata.exists(m,
                        m.key == ''Installation'')) : !(has(self.metadata) && self.metadata.exists(m,
                        m.key == ''Installation''))'
                  target:
                    description: target is the version of the control plane after
                      the update. It may never be '<none>' or have `Installation`
                      metadata
                    properties:
                      metadata:
                        description: |-
                          metadata is a list of metadata associated with the version. It is a list of key-value pairs. The value is optional
                          and when not provided, the metadata item has boolean semantics (presence indicates true)
                        items:
                          description: |-
                            VersionMetadata is a key:value item assigned to version involved in the update. Value can be empty, then the metadata
                            have boolean semantics (true when present, false when absent)
                          properties:
                            key:
                              description: key is the name of this metadata value
                              enum:
                              - Installation
                              - Partial
                              - Architecture
                              type: string
                            value:
                              description: value is the value for the metadata
                              maxLength: 32
                              type: string
                          required:
                          - key
                          type: object
                        maxItems: 5
                        type: array
                        x-kubernetes-list-map-keys:
                        - key
                        x-kubernetes-list-type: map
                      version:
                        description: |-
                          version is a semantic version string, or a placeholder '<none>' for the special case where this
                          is a "previous" version in a new installation, in which case the metadata must contain an item
                          with key 'Installation'
                        maxLength: 64
                        minLength: 5
                        type: string
                    required:
                    - version
                    type: object
                    x-kubernetes-validations:
                    - message: target version must not be '<none>' or have Installation
                        metadata
                      rule: self.version != '<none>' && !(has(self.metadata) && self.metadata.exists(m,
                        m.key == 'Installation'))
                required:
                - previous
                - target
                type: object
            required:
            - assessment
            - completion
            - resource
            - startedAt
            - versions
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
